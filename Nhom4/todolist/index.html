<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghi Chú Cá Nhân - Note Taking App</title>
  <style>
    :root[data-theme="light"] {
      --bg-primary: #f5f7fa;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f0f2f5;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-tertiary: #999999;
      --border-color: #e0e0e0;
      --accent: #7c3aed;
      --accent-hover: #6d28d9;
      --delete-color: #ef4444;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    :root[data-theme="dark"] {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-tertiary: #94a3b8;
      --border-color: #475569;
      --accent: #a78bfa;
      --accent-hover: #c4b5fd;
      --delete-color: #f87171;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color 0.3s ease, color 0.3s ease;
      line-height: 1.6;
    }

    #root {
      width: 100%;
      min-height: 100vh;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
      color: white;
      padding: 20px 0;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .note-count {
      background: rgba(255, 255, 255, 0.2);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      backdrop-filter: blur(10px);
    }

    .theme-toggle {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.1);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px;
      flex: 1;
      width: 100%;
    }

    .note-form {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
    }

    .note-input {
      flex: 1;
      padding: 14px 18px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .note-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    .btn-add {
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
    }

    .btn-add:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
    }

    .note-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-tertiary);
      font-size: 18px;
    }

    .note-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding: 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      transition: all 0.3s ease;
      box-shadow: var(--shadow);
    }

    .note-item:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.15);
    }

    .note-content {
      flex: 1;
    }

    .note-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .note-icon {
      font-size: 24px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .note-text {
      color: var(--text-primary);
      font-size: 16px;
      word-break: break-word;
      font-weight: 500;
      line-height: 1.5;
    }

    .note-time {
      font-size: 13px;
      color: var(--text-tertiary);
      display: block;
    }

    .btn-delete {
      padding: 8px 16px;
      background: rgba(239, 68, 68, 0.1);
      color: var(--delete-color);
      border: 1px solid var(--delete-color);
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      background: var(--delete-color);
      color: white;
    }

    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }

      .header h1 {
        font-size: 24px;
      }

      .note-form {
        flex-direction: column;
      }

      .btn-add {
        width: 100%;
      }

      .note-item {
        flex-direction: column;
      }

      .btn-delete {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React, { useState, useEffect, createContext, useContext } from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';

    // Theme Context
    const ThemeContext = createContext();

    function ThemeProvider({ children }) {
      const [isDark, setIsDark] = useState(() => {
        const saved = localStorage.getItem('theme');
        return saved ? JSON.parse(saved) : false;
      });

      useEffect(() => {
        localStorage.setItem('theme', JSON.stringify(isDark));
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      }, [isDark]);

      const toggleTheme = () => setIsDark(!isDark);

      return React.createElement(
        ThemeContext.Provider,
        { value: { isDark, toggleTheme } },
        children
      );
    }

    function useTheme() {
      return useContext(ThemeContext);
    }

    // Header Component
    function Header() {
      const { isDark, toggleTheme } = useTheme();
      const [noteCount, setNoteCount] = useState(0);

      useEffect(() => {
        const updateCount = () => {
          const notes = JSON.parse(localStorage.getItem('notes') || '[]');
          setNoteCount(notes.length);
        };
        
        updateCount();
        
        window.addEventListener('notesUpdated', updateCount);
        return () => window.removeEventListener('notesUpdated', updateCount);
      }, []);

      return React.createElement(
        'header',
        { className: 'header' },
        React.createElement(
          'div',
          { className: 'header-content' },
          React.createElement('h1', null, '📝 Ghi Chú Cá Nhân'),
          React.createElement(
            'div',
            { className: 'header-actions' },
            React.createElement('span', { className: 'note-count' }, `${noteCount} ghi chú`),
            React.createElement(
              'button',
              {
                className: 'theme-toggle',
                onClick: toggleTheme,
                title: isDark ? 'Sáng' : 'Tối'
              },
              isDark ? '☀️' : '🌙'
            )
          )
        )
      );
    }

    // NoteForm Component
    function NoteForm() {
      const [input, setInput] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        
        if (!input.trim()) return;

        const notes = JSON.parse(localStorage.getItem('notes') || '[]');
        const icons = ['📚', '⚡', '🔗', '🌙', '💾', '✨', '🎯', '💡'];
        const newNote = {
          id: Date.now(),
          content: input.trim(),
          createdAt: new Date().toLocaleString('vi-VN'),
          icon: icons[Math.floor(Math.random() * icons.length)]
        };

        notes.unshift(newNote);
        localStorage.setItem('notes', JSON.stringify(notes));
        window.dispatchEvent(new Event('notesUpdated'));
        
        setInput('');
      };

      return React.createElement(
        'form',
        { className: 'note-form', onSubmit: handleSubmit },
        React.createElement('input', {
          type: 'text',
          className: 'note-input',
          placeholder: 'Nhập ghi chú mới...',
          value: input,
          onChange: (e) => setInput(e.target.value)
        }),
        React.createElement('button', { type: 'submit', className: 'btn-add' }, '+ Thêm')
      );
    }

    // NoteList Component
    function NoteList() {
      const [notes, setNotes] = useState([]);

      useEffect(() => {
        const loadNotes = () => {
          const saved = JSON.parse(localStorage.getItem('notes') || '[]');
          setNotes(saved);
        };

        loadNotes();

        window.addEventListener('notesUpdated', loadNotes);
        return () => window.removeEventListener('notesUpdated', loadNotes);
      }, []);

      const handleDelete = (id) => {
        const updated = notes.filter(note => note.id !== id);
        setNotes(updated);
        localStorage.setItem('notes', JSON.stringify(updated));
        window.dispatchEvent(new Event('notesUpdated'));
      };

      return React.createElement(
        'div',
        { className: 'note-list' },
        notes.length === 0
          ? React.createElement('p', { className: 'empty-state' }, 'Chưa có ghi chú nào. Hãy thêm ghi chú mới! 📌')
          : notes.map(note =>
              React.createElement(
                'div',
                { key: note.id, className: 'note-item' },
                React.createElement(
                  'div',
                  { className: 'note-content' },
                  React.createElement(
                    'div',
                    { className: 'note-header' },
                    React.createElement('span', { className: 'note-icon' }, note.icon),
                    React.createElement('p', { className: 'note-text' }, note.content)
                  ),
                  React.createElement('span', { className: 'note-time' }, note.createdAt)
                ),
                React.createElement(
                  'button',
                  {
                    className: 'btn-delete',
                    onClick: () => handleDelete(note.id),
                    title: 'Xóa ghi chú'
                  },
                  'Xóa'
                )
              )
            )
      );
    }

    // App Component
    function App() {
      return React.createElement(
        ThemeProvider,
        null,
        React.createElement(
          'div',
          { className: 'app' },
          React.createElement(Header),
          React.createElement(
            'main',
            { className: 'container' },
            React.createElement(NoteForm),
            React.createElement(NoteList)
          )
        )
      );
    }

    // Render app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
