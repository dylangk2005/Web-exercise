<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MySite - Tailwind CSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="font-sans">
    <!-- NAVBAR -->
    <nav class="bg-blue-600 text-white px-6 py-3 flex items-center justify-between">
        <div class="font-bold text-lg">MySite</div>

        <!-- Mobile -->
        <div class="md:hidden">
            <button id="menu-btn" class="focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>

        <!-- Desktop -->
        <ul class="hidden md:flex gap-6 text-sm">
            <li><a href="#" class="hover:underline">Home</a></li>
            <li><a href="#" class="hover:underline">About</a></li>
            <li><a href="#" class="hover:underline">Contact</a></li>
        </ul>
    </nav>

    <!-- Mobile menu dropdown -->
    <div id="mobile-menu" class="hidden bg-blue-500 text-white px-6 py-3 md:hidden">
        <ul class="flex flex-col gap-2 text-sm">
            <li><a href="#" class="hover:underline">Home</a></li>
            <li><a href="#" class="hover:underline">About</a></li>
            <li><a href="#" class="hover:underline">Contact</a></li>
        </ul>
    </div>

    <!-- HERO SECTION -->
    <section class="flex flex-col md:flex-row items-center justify-center gap-8 px-10 py-16 bg-white min-h-[60vh]">
        <!-- Logo  -->
        <div class="flex-shrink-0 flex items-center gap-4">
            <svg width="70" height="56" viewBox="0 0 54 33" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="tw-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#4FD1C5" />
                        <stop offset="100%" stop-color="#38B2AC" />
                    </linearGradient>
                </defs>
                <!-- Top wave -->
                <path
                    d="M27 0C19.8 0 15.3 3.6 13.5 10.8C16.2 7.2 19.35 5.85 22.95 6.75C25.004 7.263 26.472 8.754 28.097 10.403C30.744 13.09 33.808 16.2 40.5 16.2C47.7 16.2 52.2 12.6 54 5.4C51.3 9 48.15 10.35 44.55 9.45C42.496 8.937 41.028 7.446 39.403 5.797C36.756 3.11 33.692 0 27 0Z"
                    fill="url(#tw-grad)" />
                <!-- Bottom wave -->
                <path
                    d="M13.5 16.2C6.3 16.2 1.8 19.8 0 27C2.7 23.4 5.85 22.05 9.45 22.95C11.504 23.463 12.972 24.954 14.597 26.603C17.244 29.29 20.308 32.4 27 32.4C34.2 32.4 38.7 28.8 40.5 21.6C37.8 25.2 34.65 26.55 31.05 25.65C28.996 25.137 27.528 23.646 25.903 21.997C23.256 19.31 20.192 16.2 13.5 16.2Z"
                    fill="url(#tw-grad)" />
            </svg>
            <span class="text-3xl font-bold text-gray-800 tracking-tight">Tailwind CSS</span>
        </div>

        <!-- Divider (desktop only) -->
        <div class="hidden md:block w-px h-20 bg-gray-200 mx-4"></div>

        <!-- Text + CTA -->
        <div class="text-center md:text-left max-w-xs">
            <h1 class="text-xl font-bold text-gray-800 mb-1">Learn Tailwind CSS</h1>
            <p class="text-gray-500 text-sm mb-4">
                Build responsive layouts quickly with utility-first CSS.
            </p>
            <a href="#"
                class="inline-block bg-blue-600 text-white text-sm px-5 py-2 rounded hover:bg-blue-700 transition-colors duration-200">
                Get Started
            </a>
        </div>
    </section>

    <script>
        const btn = document.getElementById("menu-btn");
        const menu = document.getElementById("mobile-menu");
        btn.addEventListener("click", () => {
            menu.classList.toggle("hidden");
        });
    </script>
</body>

</html>
